<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Allan Pinheiro - Senior Developer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="apple-touch-icon" sizes="180x180" href="images/favicon_io/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="images/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="images/favicon_io/favicon-16x16.png" />
    <link rel="manifest" href="images/favicon_io/site.webmanifest" />
    <link rel="stylesheet" href="index.css" />
  </head>

  <body>
    <canvas id="matrix-bg"></canvas>

    <div class="scanline"></div>

    <div class="terminal">
      <header class="terminal-bar">
        <div class="terminal-dots">
          <span class="dot dot-red"></span>
          <span class="dot dot-yellow"></span>
          <span class="dot dot-green"></span>
        </div>
        <span class="terminal-title">allan@dev:~</span>
        <span class="terminal-tab">portfolio</span>
      </header>

      <main class="terminal-body" id="terminal-body">
        <div class="boot-sequence" id="boot-sequence"></div>
        <div class="content" id="content" style="display:none">

          <section class="profile" id="profile"></section>

          <section class="projects-section" id="projects-section">
            <div class="section-header">
              <span class="prompt">$</span> ls ./projects <span class="cursor-static">_</span>
            </div>
            <div class="projects-grid" id="projects-grid"></div>
          </section>

        </div>
      </main>
    </div>

    <script src="index.js"></script>
  </body>
</html>
